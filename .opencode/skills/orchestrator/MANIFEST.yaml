```

## 8. Autopilot Configuration

```yaml
autopilot:
  enabled: true
  silent_mode: true
  max_autonomous_actions: unlimited
  checkpoint_interval: "10min"
  max_phase_duration: "60min"     # Alert if phase exceeds this
  auto_commit: false              # Never commit without user request
  auto_deploy: false              # Never deploy without user request
  allowed_destructive_actions:
    - file_write
    - file_delete
    - git_revert
    - package_install
    - code_refactor
    - dependency_update
  forbidden_actions:
    - git_push               # Never push
    - git_force_push          # Never force push
    - git_commit              # Never commit without ask
    - env_modify              # Never touch .env
    - credential_access       # Never read secrets
    - external_api_call       # Never call external APIs
    - npm_publish             # Never publish packages
```

