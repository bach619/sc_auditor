## 3. Skill Registry

```yaml
skills:
  apple-parallax-web:
    directory: ".opencode/skills/apple-parallax-web/"
    entry_point: "SKILL.md"
    type: "builder"
    domains: [design_ui]
    description: "Apple-quality landing pages with GSAP, Lenis, Splitting.js"

  seo-optimizer:
    directory: ".opencode/skills/seo-optimizer/"
    entry_point: "SKILL.md"
    type: "analyzer"
    domains: [seo]
    description: "SEO audit, optimization, structured data, Core Web Vitals"

  orchestrator:
    directory: ".opencode/skills/orchestrator/"
    entry_point: "SKILL.md"
    type: "controller"
    domains: [bug_fix, audit, project_build, content, data, testing, i18n, unknown]
    description: "Multi-agent project lifecycle manager. Universal fallback."

  context-router:
    directory: ".opencode/skills/context-router/"
    entry_point: "SKILL.md"
    type: "router"
    domains: [*]
    description: "Intelligent intent detection and skill routing gateway."
```

## 4. Context Enrichment Configuration

```yaml
context:
  always_collect:
    - source: "package.json"
      fields: [name, dependencies, devDependencies, scripts]
    - source: "src/"
      fields: [file_count, component_count, page_count]
    - source: ".opencode/skills/"
      fields: [available_skills]

  conditional_collect:
    design_ui:
      - source: "tailwind.config.js"
        fields: [theme, colors, fonts]
      - source: "src/index.css"
        fields: [all]
      - source: "src/components/"
        fields: [layout_files, existing_sections]
    
    seo:
      - source: "index.html"
        fields: [meta_tags, structured_data, canonical, hreflang]
      - source: "src/pages/"
        fields: [page_list, meta_per_page]
      - source: "public/"
        fields: [robots.txt, sitemap.xml]
    
    bug_fix:
      - source: "git diff"
        fields: [changed_files, added_lines]
      - source: "src/"
        fields: [files_matching_prompt_keywords]

  cache:
    enabled: true
    ttl_seconds: 300           # 5 minutes
    refresh_triggers:
      - new_file_created
      - topic_change_detected
      - user_switches_context
```

## 5. Routing Configuration

```yaml
routing:
  activation_command: "skill(\"<target-skill>\")"
  
  max_sequential_skills: 3
  sequential_cooldown: "0s"     # No wait between sequential routing
  
  prompt_format:
    header: "[Router routed from context-router]"
    include_context: true
    include_instructions: true

  error_handling:
    on_skill_unavailable: "try_fallback"
    on_fallback_unavailable: "report_and_wait"
    on_activation_failed: "try_fallback"
    max_retry_routes: 2
```

## 6. Ambiguity Resolution

```yaml
ambiguity:
  detection:
    min_score: 40              # Domains below this ignored in ambiguity check
    gap_percentage: 15         # % gap between top 2 scores ≤ this → ambiguous
    max_options_presented: 2   # Only show top 2
  
  resolution:
    default_timeout_seconds: 30
    on_timeout: "route_to_highest"
    on_select_all: "route_sequentially"
    sequential_max: 2          # Max 2 skills for "all" selection
```

## 7. Special Commands

```yaml
commands:
  skills:
    triggers: ["/skills", "skill apa aja", "list skill", "available skills", "skill list"]
    response: "render_skills_table"
  
  status:
    triggers: ["/status", "status"]
    response: "render_status_dashboard"
  
  reset:
    triggers: ["/reset", "reset"]
    response: "clear_and_confirm"
  
  help:
    triggers: ["/help", "help", "bantuan"]
    response: "render_help_text"
```

## 8. Integration with Orchestrator

```yaml
orchestrator_integration:
  agent_id: "router"
  agent_name: "ContextRouter"
  agent_type: "dispatcher"
  priority: 10                # Highest — entry point before all agents
  activation: "on_user_prompt"
  capabilities:
    - intent_detection
    - context_enrichment
    - skill_routing
    - ambiguity_resolution
  
  non_interference:
    can_delegate: true
    can_observe: true
    can_interrupt: false      # Never interrupt active agent
    can_modify_files: false   # Never modify files directly
    can_escalate: true        # Can escalate ambiguity to user
  
  handoff:
    on_route: "pass_full_context"
    on_complete: "receive_summary"
    on_failure: "receive_error"
  
  membership:
    join_agent_bus: false     # Not a full orchestrator agent
    participate_in_gates: false
    participate_in_locks: false
```

## 9. Notification Rules

```yaml
notifications:
  silent: true               # Default silent mode
  speak_on:
    - route_initiated
    - ambiguity_detected
    - fallback_used
    - skill_completed
    - route_error
    - command_response
    - greeting
  mute_on:
    - analysis_in_progress
    - context_enrichment
    - pre_route_checks
    - normal_routing
```

## 10. Edge Case Handling

```yaml
edge_cases:
  long_prompt:
    max_words_for_full_analysis: 500
    on_exceed: "summarize_first_100_words + keyword_extract → route_to_orchestrator"
  
  code_blocks:
    ignore_for_intent: true
    min_natural_language_words: 5
    on_insufficient_language: "route_to_orchestrator"
  
  non_task_messages:
    thanks: "acknowledge + offer_help"
    ok_good: "acknowledge + wait"
    question_about_opencode: "answer_directly"
    feedback: "acknowledge + log"
  
  bilingual:
    match_both_languages: true
    take_highest_score: true
```

---

*This manifest defines all operational parameters for the Context Router. Modify thresholds to tune routing sensitivity. Lower confidence thresholds = more aggressive routing. Higher thresholds = more conservative (more fallback to orchestrator).*
