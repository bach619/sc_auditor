# MANIFEST: Context Router Configuration

## Metadata
```yaml
version: "1.0.0"
codename: "router"
autonomy: full
compatibility: opencode>=1.0.0
```

## 1. Intent Detection Thresholds

### 1.1 Confidence Levels
```yaml
confidence:
  immediate_route: 80       # Route immediately, no questions
  strong_match: 60          # Route with full context enrichment
  ambiguous_gap: 15         # If 2+ domains within this %, mark ambiguous
  fallback: 40              # Below this → route to orchestrator
  no_match: 0               # Empty/greeting → respond, don't route
```

### 1.2 Keyword Weighting
```yaml
keywords:
  generic_weight: 5
  domain_weight: 10
  technology_weight: 8
  entity_weight: 15          # Exact skill name match → 100% confidence

  multipliers:
    exact_phrase: 2.0
    word_boundary: 1.5
    partial_match: 1.0
```

### 1.3 Stop Words (Ignored During Tokenization)
```yaml
stop_words:
  id: [yang, dan, di, ke, dari, untuk, dengan, ini, itu, saya, tolong, bisa, bantu, mohon, kak, mas, mba, pak, bu]
  en: [the, a, an, to, for, with, this, that, i, can, you, please, help, me, my]
```

