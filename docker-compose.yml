x-service-base: &service-base
  build:
    context: .
    dockerfile: services/__SERVICE__/Dockerfile
  networks: [vyper-net]
  restart: unless-stopped
  user: "root"
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: "512M"
      reservations:
        cpus: "0.1"
        memory: "128M"

services:
  01-config:
    <<: *service-base
    build:
      context: .
      dockerfile: services/01-config/Dockerfile
    ports: ["8011:8000"]
    volumes: [vyper_config:/data/config]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  02-immunefi:
    <<: *service-base
    build:
      context: .
      dockerfile: services/02-immunefi/Dockerfile
    ports: ["8001:8000"]
    volumes: [vyper_immunefi:/data/immunefi]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  03-source:
    <<: *service-base
    build:
      context: .
      dockerfile: services/03-source/Dockerfile
    ports: ["8002:8000"]
    volumes: [vyper_source:/data/source]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  04-scanner:
    <<: *service-base
    build:
      context: .
      dockerfile: services/04-scanner/Dockerfile
    ports: ["8003:8000"]
    volumes: [vyper_scanner:/data/scanner]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000
      - MYTHRIL_URL=http://05-scanner-mythril:8013

  # ── Scanner Services (split from 04-scanner) ──────────────────
  # Each scanner runs as an independent microservice for fault isolation,
  # independent scaling, and smaller Docker images.
  #
  # 04a = Slither (static analysis)
  # 04b = Echidna (fuzzing)
  # 04c = Forge   (build verification)
  # 04d = Halmos  (symbolic testing)
  # 04e = Manticore (symbolic execution — HIGH/CRITICAL focus)
  # 05  = Mythril (symbolic execution) — already existed

  04a-scanner-slither:
    <<: *service-base
    build:
      context: .
      dockerfile: services/04a-scanner-slither/Dockerfile
    ports: ["8014:8014"]
    volumes: [vyper_scanner_slither:/data/scanner-slither]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  04b-scanner-echidna:
    <<: *service-base
    build:
      context: .
      dockerfile: services/04b-scanner-echidna/Dockerfile
    ports: ["8015:8015"]
    volumes: [vyper_scanner_echidna:/data/scanner-echidna]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  04c-scanner-forge:
    <<: *service-base
    build:
      context: .
      dockerfile: services/04c-scanner-forge/Dockerfile
    ports: ["8016:8016"]
    volumes: [vyper_scanner_forge:/data/scanner-forge]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  04d-scanner-halmos:
    <<: *service-base
    build:
      context: .
      dockerfile: services/04d-scanner-halmos/Dockerfile
    ports: ["8017:8017"]
    volumes: [vyper_scanner_halmos:/data/scanner-halmos]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  04e-scanner-manticore:
    <<: *service-base
    build:
      context: .
      dockerfile: services/04e-scanner-manticore/Dockerfile
    ports: ["8020:8018"]
    volumes: [vyper_scanner_manticore:/data/scanner-manticore]
    depends_on: [04a-scanner-slither]
    environment:
      - CONFIG_URL=http://01-config:8000
      - SLITHER_URL=http://04a-scanner-slither:8014

  05-scanner-mythril:
    <<: *service-base
    build:
      context: .
      dockerfile: services/05-scanner-mythril/Dockerfile
    ports: ["8013:8013"]
    volumes: [vyper_scanner_mythril:/data/scanner-mythril]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  06-ai:
    <<: *service-base
    build:
      context: .
      dockerfile: services/06-ai/Dockerfile
    ports: ["8004:8000"]
    volumes: [vyper_ai:/data/ai]
    depends_on: [01-config]
    environment:
      # API keys (OPENAI_API_KEY, ANTHROPIC_API_KEY) diset via frontend Settings → Config Service
      - CONFIG_URL=http://01-config:8000

  07-classifier:
    <<: *service-base
    build:
      context: .
      dockerfile: services/07-classifier/Dockerfile
    ports: ["8005:8000"]
    volumes:
      - vyper_classifier:/data/classifier
      - vyper_learning:/data/learning
      - vyper_kb:/data/knowledge
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  08-exploit:
    <<: *service-base
    build:
      context: .
      dockerfile: services/08-exploit/Dockerfile
    ports: ["8006:8006"]
    volumes:
      - vyper_exploit:/data/exploit
      # Allow docker-py inside the exploit container to create/start/stop
      # ephemeral Anvil containers. The Docker socket MUST be mounted
      # read-write so the SDK can perform container lifecycle operations.
      - /var/run/docker.sock:/var/run/docker.sock
      - vyper_kb:/data/knowledge
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000
    privileged: false
    # Run exploit container as root so it can access the mounted Docker
    # socket at /var/run/docker.sock (needed by docker-py to create Anvil
    # ephemeral containers). The Dockerfile sets USER appuser; override
    # here to ensure socket access. For production, consider a more
    # secure approach (matching host docker group id via group_add).
    user: "root"

  09-reporter:
    <<: *service-base
    build:
      context: .
      dockerfile: services/09-reporter/Dockerfile
    ports: ["8007:8007"]
    volumes: [vyper_reporter:/data/reporter]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  10-notifier:
    <<: *service-base
    build:
      context: .
      dockerfile: services/10-notifier/Dockerfile
    ports: ["8008:8000"]
    volumes: [vyper_notifier:/data/notifier]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  11-orchestrator:
    <<: *service-base
    build:
      context: .
      dockerfile: services/11-orchestrator/Dockerfile
    ports: ["8009:8000"]
    volumes:
      - vyper_orchestrator:/data/orchestrator
      - vyper_learning:/data/learning
    depends_on:
      - 02-immunefi
      - 03-source
      - 04a-scanner-slither
      - 04b-scanner-echidna
      - 04c-scanner-forge
      - 04d-scanner-halmos
      - 04-scanner
      - 05-scanner-mythril
      - 06-ai
      - 07-classifier
      - 08-exploit
      - 09-reporter
      - 10-notifier
      - 01-config
    environment:
      - CONFIG_URL=http://01-config:8000
      # Scanner URLs (defaults in config.py already point to correct services)
      # These can be overridden via env if needed

  12-webhook:
    <<: *service-base
    build:
      context: .
      dockerfile: services/12-webhook/Dockerfile
    ports: ["8010:8000"]
    volumes: [vyper_webhook:/data/webhook]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  13-upkeep:
    <<: *service-base
    build:
      context: .
      dockerfile: services/13-upkeep/Dockerfile
    ports: ["8012:8000"]
    volumes: [vyper_upkeep:/data/upkeep]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  14-agent:
    <<: *service-base
    build:
      context: .
      dockerfile: services/14-agent/Dockerfile
    ports: ["8021:8000"]   # 8021 (bentrok duluan dengan 04a-scanner-slither di 8014)
    volumes: [vyper_agent:/data/agent]
    depends_on:
      - 01-config
      - 02-immunefi
      - 03-source
      - 04-scanner
      - 06-ai
      - 07-classifier
      - 08-exploit
      - 09-reporter
      - 10-notifier
    environment:
      - CONFIG_URL=http://01-config:8000

  15-dashboard:
    <<: *service-base
    build:
      context: .
      dockerfile: services/15-dashboard/Dockerfile
    ports: ["8000:8000"]
    volumes:
      - vyper_dashboard:/data/dashboard
      - vyper_learning:/data/learning
    depends_on: [11-orchestrator, 01-config, 14-agent]
    environment:
      - CONFIG_URL=http://01-config:8000
      - ORCHESTRATOR_URL=http://11-orchestrator:8000
      - SCANNER_URL=http://04-scanner:8000
      - SCANNER_SLITHER_URL=http://04a-scanner-slither:8014
      - SCANNER_ECHIDNA_URL=http://04b-scanner-echidna:8015
      - SCANNER_FORGE_URL=http://04c-scanner-forge:8016
      - CLASSIFIER_URL=http://07-classifier:8000
      - IMMUNEFI_URL=http://02-immunefi:8000
      - SOURCE_URL=http://03-source:8000
      - REPORTER_URL=http://09-reporter:8007
      - NOTIFIER_URL=http://10-notifier:8000
      - EXPLOIT_URL=http://08-exploit:8006
      - WEBHOOK_URL=http://12-webhook:8000
      - UPKEEP_URL=http://13-upkeep:8000
      - SUBMISSION_URL=http://16-submission:8000
      - AGENT_URL=http://14-agent:8000

  16-submission:
    <<: *service-base
    build:
      context: .
      dockerfile: services/16-submission/Dockerfile
    ports: ["8018:8000"]
    volumes: [vyper_submission:/data/submission]
    depends_on: [01-config, 02-immunefi, 03-source, 06-ai, 08-exploit, 11-orchestrator]
    environment:
      - CONFIG_URL=http://01-config:8000
      - IMMUNEFI_URL=http://02-immunefi:8000
      - SOURCE_URL=http://03-source:8000
      - AI_URL=http://06-ai:8000
      - EXPLOIT_URL=http://08-exploit:8006
      - ORCHESTRATOR_URL=http://11-orchestrator:8000

  17-experience:
    <<: *service-base
    build:
      context: .
      dockerfile: services/17-experience/Dockerfile
    ports: ["8019:8019"]
    volumes: [vyper_experience:/data/experience]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8019/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # Bounty Platform Integrations (18–21)
  # ═══════════════════════════════════════════════════════════════
  # 18 = Code4rena (audit contests via GraphQL)
  # 19 = Sherlock  (audit contests via REST API)
  # 20 = Cantina   (audit contests via REST API)
  # 21 = Hats Finance (audit vaults via REST API)

  18-code4rena:
    <<: *service-base
    build:
      context: .
      dockerfile: services/18-code4rena/Dockerfile
    ports: ["8022:8000"]
    volumes: [vyper_code4rena:/data/code4rena]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  19-sherlock:
    <<: *service-base
    build:
      context: .
      dockerfile: services/19-sherlock/Dockerfile
    ports: ["8023:8000"]
    volumes: [vyper_sherlock:/data/sherlock]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  20-cantina:
    <<: *service-base
    build:
      context: .
      dockerfile: services/20-cantina/Dockerfile
    ports: ["8024:8000"]
    volumes: [vyper_cantina:/data/cantina]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  21-hats:
    <<: *service-base
    build:
      context: .
      dockerfile: services/21-hats/Dockerfile
    ports: ["8025:8000"]
    volumes: [vyper_hats:/data/hats]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  # ═══════════════════════════════════════════════════════════════
  # Multi-Chain Source Fetchers (22)
  # ═══════════════════════════════════════════════════════════════
  # 22 = StarkNet/Cairo source fetcher (Voyager + Starkscan)

  22-source-starknet:
    <<: *service-base
    build:
      context: .
      dockerfile: services/22-source-starknet/Dockerfile
    ports: ["8026:8000"]
    volumes: [vyper_starknet_source:/data/starknet-source]
    depends_on: [01-config]
    environment:
      - CONFIG_URL=http://01-config:8000

  # ═══════════════════════════════════════════════════════════════
  # Multi-Chain Scanners (23)
  # ═══════════════════════════════════════════════════════════════
  # 23 = Cairo/StarkNet scanner (pattern-based detectors)

  23-scanner-cairo:
    <<: *service-base
    build:
      context: .
      dockerfile: services/23-scanner-cairo/Dockerfile
    ports: ["8028:8000"]
    volumes: [vyper_scanner_cairo:/data/scanner-cairo]
    depends_on: [01-config, 22-source-starknet]
    environment:
      - CONFIG_URL=http://01-config:8000
      - SOURCE_STARKNET_URL=http://22-source-starknet:8000

volumes:
  vyper_agent:
  vyper_dashboard:
  vyper_config:
  vyper_scanner_slither:
  vyper_scanner_echidna:
  vyper_scanner_forge:
  vyper_scanner_halmos:
  vyper_scanner_manticore:
  vyper_cantina:
  vyper_hats:
  vyper_starknet_source:
  vyper_scanner_cairo:
  vyper_code4rena:
  vyper_sherlock:
  vyper_immunefi:
  vyper_source:
  vyper_scanner:
  vyper_scanner_mythril:
  vyper_ai:
  vyper_classifier:
  vyper_exploit:
  vyper_reporter:
  vyper_notifier:
  vyper_orchestrator:
  vyper_webhook:
  vyper_upkeep:
  vyper_submission:
  vyper_experience:
  vyper_kb:
  vyper_learning:

networks:
  vyper-net:
    driver: bridge
