name: Security Scan

on:
  schedule:
    # Run weekly on Monday at 6:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]
    paths:
      - 'services/*/requirements.txt'
      - 'services/15-dashboard/frontend/package-lock.json'

jobs:
  python-scan:
    name: Python Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Scan Python dependencies
        id: scan
        run: |
          total_vulns=0
          for req in services/*/requirements.txt; do
            echo "=== Scanning $req ==="
            out=$(pip-audit -r "$req" --desc 2>&1 || true)
            echo "$out"
            vulns=$(echo "$out" | grep -c "CVE-\|GHSA-\|PYSEC-" || echo "0")
            total_vulns=$((total_vulns + vulns))
          done
          echo "total_vulns=$total_vulns" >> "$GITHUB_OUTPUT"
      - name: Quality Gate — zero known vulnerabilities
        run: |
          total=${{ steps.scan.outputs.total_vulns }}
          echo "Total vulnerabilities found: $total"
          if [ "$total" -gt 0 ]; then
            echo "ERROR: $total known vulnerabilities detected. Upgrade affected packages."
            exit 1
          fi
          echo "Security scan PASSED — 0 CVEs"

  npm-scan:
    name: NPM Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit frontend dependencies
        run: |
          cd services/15-dashboard/frontend
          npm audit --audit-level=high
