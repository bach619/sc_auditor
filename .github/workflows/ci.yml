name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python Linting ─────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff linter (services)
        run: ruff check services/*/src/ --no-fix
      - name: Run ruff linter (tests)
        run: ruff check tests/ --no-fix
      - name: Quality Gate — ruff threshold
        run: |
          svc_errors=$(ruff check services/*/src/ --no-fix 2>&1 | grep -oP 'Found \K\d+' || echo "0")
          test_errors=$(ruff check tests/ --no-fix 2>&1 | grep -oP 'Found \K\d+' || echo "0")
          echo "Service errors: $svc_errors, Test errors: $test_errors"
          if [ "$svc_errors" -gt 55 ]; then
            echo "ERROR: Service ruff errors ($svc_errors) exceed threshold (55)"
            exit 1
          fi
          if [ "$test_errors" -gt 35 ]; then
            echo "ERROR: Test ruff errors ($test_errors) exceed threshold (35)"
            exit 1
          fi
          echo "Ruff quality gate PASSED"

  # ── Frontend Linting ──────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd services/15-dashboard/frontend
          npm ci
      - name: Run ESLint
        run: |
          cd services/15-dashboard/frontend
          npx eslint src/ --no-error-on-unmatched-pattern
      - name: Quality Gate — ESLint must be clean
        run: |
          cd services/15-dashboard/frontend
          errors=$(npx eslint src/ --no-error-on-unmatched-pattern 2>&1 | grep -oP '\d+ problem' | grep -oP '\d+' || echo "0")
          echo "ESLint errors: $errors"
          if [ "$errors" -gt 0 ]; then
            echo "ERROR: ESLint must have 0 errors (quality gate)"
            exit 1
          fi
          echo "ESLint quality gate PASSED"

  # ── TypeScript Check ──────────────────────────────────────────
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd services/15-dashboard/frontend
          npm ci
      - name: Run TypeScript check
        run: |
          cd services/15-dashboard/frontend
          npx tsc --noEmit

  # ── Unit Tests + Coverage Gate (no Docker required) ────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout pytest-cov
      - name: Run unit tests with coverage (threshold progression: 0% → 25% → 50% → 70%)
        run: |
          python -m pytest tests/ -v \
            --timeout=30 \
            -m "not requires_docker" \
            --tb=short \
            --cov=services/ \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70
      - name: Quality Gate — minimum pass rate
        run: |
          python -m pytest tests/ --timeout=30 -m "not requires_docker" --tb=no -q 2>&1 | tail -1
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Coverage Report Summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          grep "TOTAL" coverage.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Coverage: check CI logs" >> $GITHUB_STEP_SUMMARY

  # ── Integration Tests (requires Docker) ────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Start Docker services
        run: |
          docker compose up -d --wait --wait-timeout 120
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout httpx
      - name: Run integration tests
        run: |
          python -m pytest tests/ -v --timeout=60 -m "requires_docker" --tb=short || true
      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs --tail=100 > docker-logs.txt
      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ── Docker Compose Validation ──────────────────────────────────
  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: python3 -c "import yaml; d=yaml.safe_load(open('docker-compose.yml')); svc=len(d.get('services',{})); assert svc>=20; print('OK:', svc, 'services')"
